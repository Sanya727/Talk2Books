<!DOCTYPE html>
<html>

<head>
<title>Talk2Books</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Talk2Books</h1>

<h3>Select Input Type</h3>

<button onclick="mode('doc')">Document</button>
<button onclick="mode('youtube')">YouTube</button>
<button onclick="mode('website')">Website</button>

<div id="docUpload" style="display:none">

<input type="file" id="files" multiple>
<button onclick="uploadDocs()">Upload</button>

</div>

<div id="youtubeInput" style="display:none">

<input type="text" id="ytlink">
<button onclick="processYoutube()">Submit</button>

</div>

<div id="webInput" style="display:none">

<input type="text" id="weblink">
<button onclick="processWebsite()">Submit</button>

</div>

<hr>

<label>Question Language</label>

<select id="qlang">
<option value="en">English</option>
<option value="hi">Hindi</option>
<option value="bn">Bengali</option>
<option value="mr">Marathi</option>
<option value="te">Telugu</option>
<option value="ta">Tamil</option>
<option value="gu">Gujarati</option>
<option value="kn">Kannada</option>
<option value="ml">Malayalam</option>
<option value="pa">Punjabi</option>
<option value="or">Odia</option>
<option value="as">Assamese</option>
<option value="ur">Urdu</option>
</select>

<label>Answer Language</label>

<select id="alang">
<option value="en">English</option>
<option value="hi">Hindi</option>
<option value="bn">Bengali</option>
<option value="mr">Marathi</option>
<option value="te">Telugu</option>
<option value="ta">Tamil</option>
<option value="gu">Gujarati</option>
<option value="kn">Kannada</option>
<option value="ml">Malayalam</option>
<option value="pa">Punjabi</option>
<option value="or">Odia</option>
<option value="as">Assamese</option>
<option value="ur">Urdu</option>
</select>

<br><br>

<textarea id="question"></textarea>

<button onclick="ask()">Ask Question</button>

<div id="answer"></div>

<script src="script.js"></script>

</body>
</html>
